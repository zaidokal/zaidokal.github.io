<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Food Selection</title>
        <style>
            body {
                text-align: center;
                margin-top: 30px;
                font-family: 'Courier';
                background-color: #FFF5E4;
                color: #FF9494;
            }

            #foodquestion {
                font-size: 50px;
                margin-bottom: 30px;
            }

            .food-item {
                display: inline-block;
                margin: 10px;
                vertical-align: top;
                color: #FF9494;
            }

            .food-item img {
                width: 220px;
                height: auto;
                padding: 10px;
            }

            .food-item label {
                display: block;
            }

            .button {
                padding: 10px 20px;
                font-size: 18px;
                cursor: pointer;
                margin: 10px;
                font-family: 'courier';
                margin-bottom: 20px;
                background-color: #FFE3E1;
                color: #e67373;
                border-radius: 12px;
                border: 2px solid #FFE3E1;
            }
        </style>
    </head>

    <body>
        <div id="foodquestion"><b><u>What foods would you like to eat?</u></b></div>

        <div class="food-selection">
            <div class="food-item" onclick="highlightFoodItem(this)">
                <img src="../food/burgers.jpeg" alt="Burgers, fries and fried chicken">
                <label>Burgers, Fries and Chicken</label>
            </div>

            <div class="food-item" onclick="highlightFoodItem(this)">
                <img src="../food/dog.jpeg" alt="dog">
                <label>Hotdog</label>
            </div>
            <div class="food-item" onclick="highlightFoodItem(this)">
                <img src="../food/koreanfood.jpeg" alt="koreanfood">
                <label>Korean</label>
            </div>
            <div class="food-item" onclick="highlightFoodItem(this)">
                <img src="../food/pasta.jpeg" alt="pasta">
                <label>Pasta</label>
            </div>
            <div class="food-item" onclick="highlightFoodItem(this)">
                <img src="../food/pizza.jpeg" alt="pizza">
                <label>Pizza</label>
            </div>
            <div class="food-item" onclick="highlightFoodItem(this)">
                <img src="../food/salad.jpeg" alt="salad">
                <label>Salad</label>
            </div>
            <div class="food-item" onclick="highlightFoodItem(this)">
                <img src="../food/steak.jpeg" alt="steak">
                <label>Steak</label>
            </div>
            <div class="food-item" onclick="highlightFoodItem(this)">
                <img src="../food/sushi.jpeg" alt="sushi">
                <label>Sushi</label>
            </div>
        </div>
        <button class="button" onclick="location.href='dessert.html'">Continue Here :)</button>

    </body>
    <style>
        .food-item {
            cursor: pointer;
            position: relative;
        }

        .food-item::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border: 2px solid transparent;
            pointer-events: none;
            transition: border-color 0.3s ease;
            z-index: -1;
        }

        .food-item:hover::after,
        .food-item.highlight::after {
            border-image: linear-gradient(to right, rgb(250, 108, 103), transparent);
            border-image-slice: 1;
            border-width: 5px;
        }

        .food-item img {
            width: 200px;
            height: 150px;
        }
    </style>

    <script>
        function highlightFoodItem(element) {
            element.classList.toggle('highlight');
        }
    </script>


</html>
