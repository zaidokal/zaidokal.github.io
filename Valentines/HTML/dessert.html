<!DOCTYPE html>
<html lang="en">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Dessert</title>
		<style>
			body {
				text-align: center;
				margin-top: 30px;
				font-family: courier;
				background-color: #FFF5E4;
				color: #FF9494;
			}

			#dessertquestion {
				font-size: 50px;
				margin-bottom: 30px;
				font-weight: bold;
			}

			.dessert-item {
				display: inline-table;
				margin: 10px;
				vertical-align: top;
				color: #FF9494;
			}

			.dessert-item img {
				width: 220px;
				height: auto;
				padding: 10px;
			}

			.dessert-item label {
				display: block;
			}

			.button {
				padding: 10px 20px;
				font-size: 18px;
				cursor: pointer;
				margin: 10px;
				font-family: 'courier';
				margin-bottom: 20px;
				background-color: #FFE3E1;
				color: #e67373;
				border-radius: 12px;
				border: 2px solid #FFE3E1;
			}
		</style>
	</head>

	<body>
		<div id="dessertquestion"> Which dessert we eatin cuh </div>

		<div class="dessert-selection">

			<div class="dessert-item" onclick="highlightFoodItem(this)">
				<img src="../food/boba.jpeg" alt="boba">
				<label>Boba</label>
			</div>
			<div class="dessert-item" onclick="highlightFoodItem(this)">
				<img src="../food/churro.jpeg" alt="churro">
				<label>Churro</label>
			</div>
			<div class="dessert-item" onclick="highlightFoodItem(this)">
				<img src="../food/kunafa.jpg" alt="che">
				<label>Knafeh</label>
			</div>
			<div class="dessert-item" onclick="highlightFoodItem(this)">
				<img src="../food/Matcha.jpg" alt="mochi">
				<label>Matcha</label>
			</div>
			<div class="dessert-item" onclick="highlightFoodItem(this)">
				<img src="../food/vanilla-cake.jpeg" alt="vanilla-cake">
				<label>Vanilla Cake</label>
			</div>
			<div class="dessert-item" onclick="highlightFoodItem(this)">
				<img src="../food/No-Dessert.jpg" alt="taiyaki">
				<label>No Dessert</label>
			</div>
		</div>
		<button class="button" onclick="location.href='activities.html'">Continue Here :)</button>

	</body>

	<style>
		.dessert-item {
			cursor: pointer;
			position: relative;
		}

		.dessert-item::after {
			content: '';
			position: absolute;
			top: -5px;
			left: -5px;
			right: -5px;
			bottom: -5px;
			border: 2px solid transparent;
			pointer-events: none;
			transition: border-color 0.3s ease;
			z-index: -1;
		}

		.dessert-item:hover::after,
		.dessert-item.highlight::after {
			border-image: linear-gradient(to right, rgb(250, 108, 103), transparent);
			border-image-slice: 1;
			border-width: 5px;
		}

		.dessert-item img {
			width: 300px;
			height: 180px;
		}
	</style>

	<script>
		function highlightFoodItem(element) {
			element.classList.toggle('highlight');
		}
	</script>


</html>
