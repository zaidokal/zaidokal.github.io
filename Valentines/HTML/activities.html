<!DOCTYPE html>
<html lang="en">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Document</title>
		<style>
			body {
				text-align: center;
				margin-top: 30px;
				font-family: 'Courier';
				background-color: #FFF5E4;
				color: #FF9494;
			}

			#activityquestion {
				font-size: 50px;
				margin-bottom: 30px;
			}

			.activity-item {
				display: inline-block;
				margin: 10px;
				vertical-align: top;
				color: #FF9494;
			}

			.activity-item img {
				width: 220px;
				height: auto;
				padding: 10px;
			}

			.activity-item label {
				display: block;
			}

			.button {
				padding: 10px 20px;
				font-size: 18px;
				cursor: pointer;
				margin: 10px;
				font-family: 'courier';
				margin-bottom: 20px;
				background-color: #FFE3E1;
				color: #e67373;
				border-radius: 12px;
				border: 2px solid #FFE3E1;
			}
		</style>
	</head>

	<body>
		<div id="activityquestion"><b>What are we doing after?</b>
		</div>
		<div class="activities-selection">
			<div class="activity-item" onclick="highlightFoodItem(this)">
				<img src="../activities/aquarium.jpeg" alt="aquarium">
				<label>Aquarium</label>
			</div>
			<div class="activity-item" onclick="highlightFoodItem(this)">
				<img src="../activities/arcade.jpeg" alt="arcade">
				<label>Arcade</label>
			</div>
			<div class="activity-item" onclick="highlightFoodItem(this)">
				<img src="../activities/cinema.jpeg" alt="cinema">
				<label>Cinema</label>
			</div>
			<div class="activity-item" onclick="highlightFoodItem(this)">
				<img src="../activities/keramika.jpeg" alt="ceramics">
				<label>Ceramics</label>
			</div>
			<div class="activity-item" onclick="highlightFoodItem(this)">
				<img src="../activities/kunsthalle.jpeg" alt="kunsthalle">
				<label>Exhibition</label>
			</div>
			<div class="activity-item" onclick="highlightFoodItem(this)">
				<img src="../activities/park.jpeg" alt="park.jpeg">
				<label>Park</label>
			</div>
		</div>
		<button class="button" onclick="location.href='lastpage.html'">Last page</button>
	</body>

	<style>
		.activity-item {
			cursor: pointer;
			position: relative;
		}

		.activity-item::after {
			content: '';
			position: absolute;
			top: -5px;
			left: -5px;
			right: -5px;
			bottom: -5px;
			border: 2px solid transparent;
			pointer-events: none;
			transition: border-color 0.3s ease;
			z-index: -1;
		}

		.activity-item:hover::after,
		.activity-item.highlight::after {
			border-image: linear-gradient(to right, rgb(250, 108, 103), transparent);
			border-image-slice: 1;
			border-width: 5px;
		}

		.activity-item img {
			width: 300px;
			height: 180px;
		}
	</style>

	<script>
		function highlightFoodItem(element) {
			element.classList.toggle('highlight');
		}
	</script>

</html>
